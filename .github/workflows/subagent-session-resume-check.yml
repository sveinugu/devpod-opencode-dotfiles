name: subagent-session-resume-check

on:
  pull_request:

jobs:
  warning-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan changed files for handoff metadata (warning mode)
        shell: bash
        run: |
          # WARNING MODE: this check currently never fails the workflow.
          # Flip to enforcement later by exiting non-zero when missing_count > 0.

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          mapfile -t changed_files < <(git diff --name-only "$base_sha...$head_sha")

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No changed files in PR diff."
            exit 0
          fi

          requirements=(
            'Session: ses_'
            'Resume: $ses_'
            'Owner:'
            'Authority:'
          )

          missing_count=0
          echo "Checking ${#changed_files[@]} changed file(s) for required strings..."

          for file in "${changed_files[@]}"; do
            if [ ! -f "$file" ]; then
              continue
            fi

            for needle in "${requirements[@]}"; do
              if command -v rg >/dev/null 2>&1; then
                if ! rg -F -q -- "$needle" "$file"; then
                  echo "MISSING: '$needle' in $file"
                  missing_count=$((missing_count + 1))
                fi
              else
                if ! grep -F -q -- "$needle" "$file"; then
                  echo "MISSING: '$needle' in $file"
                  missing_count=$((missing_count + 1))
                fi
              fi
            done
          done

          echo "Summary: missing occurrences = $missing_count"
          echo "(warning mode active; workflow exits 0)"
          exit 0
