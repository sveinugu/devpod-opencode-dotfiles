version: v2beta1
name: dotfiles

images:
  workspace:
    image: devspace-bare-hub:task1-20260524
    dockerfile: ./Dockerfile

deployments:
  workspace:
    kubectl:
      manifests:
        - k8s/devspace-bare-hub/workspace-pvc.yaml
        - k8s/devspace-bare-hub/workspace-deployment.yaml

dev:
  workspace:
    labelSelector:
      app.kubernetes.io/name: dotfiles-workspace
    container: workspace
    command:
      - sh
      - -lc
      - |
        if [ -x /workspaces/dotfiles/main/scripts/devspace-dev-preflight.sh ]; then
          /workspaces/dotfiles/main/scripts/devspace-dev-preflight.sh
        else
          echo "workspace not provisioned; run devspace run-pipeline provision" >&2
          exit 1
        fi
        exec zsh
    ssh:
      enabled: true
      useInclude: true

pipelines:
  provision: |-
    run_default_pipelines deploy
    kubectl wait --for=condition=available --timeout=120s deployment/dotfiles-workspace
    POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=dotfiles-workspace -o jsonpath='{.items[0].metadata.name}')
    [ -n "$POD_NAME" ]
    kubectl exec "$POD_NAME" -- sh -lc '/workspaces/dotfiles/main/scripts/workspace-provision.sh'

  doctor: |-
    echo "doctor pipeline placeholder; Task 4 adds checks"

  repair: |-
    echo "repair pipeline placeholder; Task 4 adds non-destructive repair"

  destroy: |-
    echo "destroy pipeline placeholder; Task 4 adds destructive cleanup"
