# Start here: README.md explains the repo, audiences, and first commands.
# For lifecycle behavior, see docs/superpowers/runbooks/devspace-workspace-lifecycle.md.
# For host bootstrap context, see docs/superpowers/runbooks/host-bare-hub-bootstrap.md.

version: v2beta1
name: dotfiles

images:
  workspace:
    image: devspace-bare-hub:task1-20260524
    dockerfile: ./Dockerfile

deployments:
  workspace:
    kubectl:
      manifests:
        - k8s/devspace-bare-hub/workspace-pvc.yaml
        - k8s/devspace-bare-hub/workspace-deployment.yaml

dev:
  workspace:
    labelSelector:
      app.kubernetes.io/name: dotfiles-workspace
    container: workspace
    command:
      - sh
      - -lc
      - |
        install_env=/workspaces/dotfiles/state/hub/etc/install.env
        if [ -f "$install_env" ]; then
          # shellcheck disable=SC1090
          . "$install_env"
        fi

        preflight_dir="${HUB_INSTALL_BRANCH_DIR:-/workspaces/dotfiles/main}"
        if [ -x "$preflight_dir/scripts/preflight-devspace-dev.sh" ]; then
          "$preflight_dir/scripts/preflight-devspace-dev.sh"
        elif [ -x /workspaces/dotfiles/main/scripts/devspace-dev-preflight.sh ]; then
          /workspaces/dotfiles/main/scripts/devspace-dev-preflight.sh
        elif [ -d /workspaces/dotfiles/.bare ]; then
          echo "warning: workspace provisioned but preflight script not found" >&2
        else
          echo "workspace not provisioned; run devspace run-pipeline provision" >&2
          exit 1
        fi
        exec sleep infinity
    terminal:
      command: cd /workspaces/dotfiles/main && exec zsh
    ssh:
      enabled: true
      useInclude: true

pipelines:
  provision:
    flags:
      - name: no-prompts
      - name: refresh-tools
    run: |-
      create_deployments --all
      kubectl wait --for=condition=available --timeout=120s deployment/dotfiles-workspace -n ${DEVSPACE_NAMESPACE}
      POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=dotfiles-workspace -n ${DEVSPACE_NAMESPACE} -o jsonpath='{.items[0].metadata.name}')
      [ -n "$POD_NAME" ]
      HUB_GIT_IDENTITY_ENV=$(bash scripts/resolve-git-identity.sh ${HUB_GIT_IDENTITY_ARGS:-})
      if [ "$(get_flag "no-prompts")" = "true" ]; then
        HUB_GIT_IDENTITY_ENV=$(bash scripts/resolve-git-identity.sh --no-prompts ${HUB_GIT_IDENTITY_ARGS:-})
      fi
      eval "$HUB_GIT_IDENTITY_ENV"
      HUB_PROVISION_RUNTIME_ARGS="${HUB_PROVISION_ARGS:-}"
      if [ "$(get_flag "refresh-tools")" = "true" ]; then
        HUB_PROVISION_RUNTIME_ARGS="--refresh-tools ${HUB_PROVISION_ARGS:-}"
      fi
      tar cf - -C scripts lib/hub-repo-core.sh lib/worktree-env.sh provision-workspace.sh | kubectl exec -i "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- tar xf - -C /tmp
      tar cf - bin/sync-provider-enablement | kubectl exec -i "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- tar xf - -C /tmp
      kubectl exec "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- env HUB_GITHUB_USER_NAME="${HUB_GITHUB_USER_NAME:-}" HUB_GITHUB_USER_EMAIL="${HUB_GITHUB_USER_EMAIL:-}" HUB_INSTALL_BRANCH="${HUB_INSTALL_BRANCH:-main}" sh -lc 'HUB_WORKSPACE_ROOT=/workspaces/dotfiles HUB_PROVISION_SOURCE=https://github.com/sveinugu/devpod-opencode-dotfiles.git /tmp/provision-workspace.sh ${HUB_PROVISION_RUNTIME_ARGS:-}'
      kubectl exec "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- sh -lc '. /workspaces/dotfiles/state/hub/etc/install.env && HUB_WORKSPACE_ROOT=/workspaces/dotfiles /tmp/bin/sync-provider-enablement --runtime-output "$HUB_INSTALL_BRANCH_DIR/.config/opencode/provider-runtime.json" --verification-output "$HUB_INSTALL_BRANCH_DIR/.config/opencode/provider-verification.json"'

  doctor: |-
    create_deployments --all
    kubectl wait --for=condition=available --timeout=120s deployment/dotfiles-workspace -n ${DEVSPACE_NAMESPACE}
    POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=dotfiles-workspace -n ${DEVSPACE_NAMESPACE} -o jsonpath='{.items[0].metadata.name}')
    [ -n "$POD_NAME" ]
    HUB_CHECK_DEPLOYMENT=$(kubectl get deployment dotfiles-workspace -n ${DEVSPACE_NAMESPACE} -o name >/dev/null 2>&1 && printf yes || printf no)
    HUB_CHECK_PVC=$(kubectl get pvc dotfiles-workspace -n ${DEVSPACE_NAMESPACE} -o name >/dev/null 2>&1 && printf yes || printf no)
    tar cf - -C ops check-workspace.sh | kubectl exec -i "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- tar xf - -C /tmp
    kubectl exec "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- env DEVSPACE_NAMESPACE=${DEVSPACE_NAMESPACE} HUB_WORKSPACE_ROOT=/workspaces/dotfiles HUB_HOME_DIR=/home/vscode HUB_CHECK_DEPLOYMENT="$HUB_CHECK_DEPLOYMENT" HUB_CHECK_PVC="$HUB_CHECK_PVC" HUB_CHECK_POD="$POD_NAME" bash /tmp/check-workspace.sh

  repair: |-
    create_deployments --all
    kubectl wait --for=condition=available --timeout=120s deployment/dotfiles-workspace -n ${DEVSPACE_NAMESPACE}
    POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=dotfiles-workspace -n ${DEVSPACE_NAMESPACE} -o jsonpath='{.items[0].metadata.name}')
    [ -n "$POD_NAME" ]
    HUB_INSTALL_BRANCH="${HUB_INSTALL_BRANCH:-main}"
    tar cf - -C bin repair-workspace | kubectl exec -i "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- tar xf - -C /tmp
    kubectl exec "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- env HUB_WORKSPACE_ROOT=/workspaces/dotfiles HUB_HOME_DIR=/home/vscode HUB_INSTALL_BRANCH="$HUB_INSTALL_BRANCH" bash /tmp/repair-workspace

  destroy: |-
    bash ops/destroy-workspace.sh

  verify-ssh: |-
    ssh -o BatchMode=yes workspace.dotfiles.devspace 'pwd'
    ssh -o BatchMode=yes workspace.dotfiles.devspace 'test -d /workspaces/dotfiles/main && printf ok\n'
