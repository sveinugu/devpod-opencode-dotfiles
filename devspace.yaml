version: v2beta1
name: dotfiles

images:
  workspace:
    image: devspace-bare-hub:task1-20260524
    dockerfile: ./Dockerfile

deployments:
  workspace:
    kubectl:
      manifests:
        - k8s/devspace-bare-hub/workspace-pvc.yaml
        - k8s/devspace-bare-hub/workspace-deployment.yaml

dev:
  workspace:
    labelSelector:
      app.kubernetes.io/name: dotfiles-workspace
    container: workspace
    command:
      - sh
      - -lc
      - |
        if [ -x /workspaces/dotfiles/main/scripts/devspace-dev-preflight.sh ]; then
          /workspaces/dotfiles/main/scripts/devspace-dev-preflight.sh
        else
          echo "workspace not provisioned; run devspace run-pipeline provision" >&2
          exit 1
        fi
        exec sleep infinity
    terminal:
      command: cd /workspaces/dotfiles/main && exec zsh
    ssh:
      enabled: true
      useInclude: true

pipelines:
  provision: |-
    create_deployments --all
    kubectl wait --for=condition=available --timeout=120s deployment/dotfiles-workspace -n ${DEVSPACE_NAMESPACE}
    POD_NAME=$(kubectl get pods -l app.kubernetes.io/name=dotfiles-workspace -n ${DEVSPACE_NAMESPACE} -o jsonpath='{.items[0].metadata.name}')
    [ -n "$POD_NAME" ]
    tar cf - -C scripts lib/hub-repo-core.sh workspace-provision.sh | kubectl exec -i "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- tar xf - -C /tmp
    kubectl exec "$POD_NAME" -n ${DEVSPACE_NAMESPACE} -- env HUB_PROVISION_BRANCH="${HUB_PROVISION_BRANCH:-main}" sh -lc 'HUB_WORKSPACE_ROOT=/workspaces/dotfiles HUB_PROVISION_SOURCE=https://github.com/sveinugu/devpod-opencode-dotfiles.git /tmp/workspace-provision.sh ${HUB_PROVISION_ARGS:-}'

  doctor: |-
    echo "doctor pipeline placeholder; Task 4 adds checks"

  repair: |-
    echo "repair pipeline placeholder; Task 4 adds non-destructive repair"

  destroy: |-
    echo "destroy pipeline placeholder; Task 4 adds destructive cleanup"

  verify-ssh: |-
    ssh -o BatchMode=yes workspace.dotfiles.devspace 'pwd'
    ssh -o BatchMode=yes workspace.dotfiles.devspace 'test -d /workspaces/dotfiles/main && printf ok\n'
